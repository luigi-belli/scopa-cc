services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: scopa
      POSTGRES_USER: scopa
      POSTGRES_PASSWORD: scopa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scopa"]
      interval: 3s
      timeout: 3s
      retries: 10

  php:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scopa:scopa@postgres:5432/scopa?serverVersion=17
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_JWT_SECRET: "!ChangeThisMercureHubJWTSecretKey!ForScopa2026!"
      APP_ENV: prod
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null && test -f /app/vendor/autoload.php"]
      interval: 5s
      timeout: 5s
      retries: 10

  messenger-worker:
    build: ./api
    command: php bin/console messenger:consume async --time-limit=3600 --env=prod
    depends_on:
      php:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scopa:scopa@postgres:5432/scopa?serverVersion=17
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_JWT_SECRET: "!ChangeThisMercureHubJWTSecretKey!ForScopa2026!"
      APP_ENV: prod
    restart: unless-stopped

  cron:
    build: ./api
    entrypoint: ["sh", "-c"]
    command:
      - |
        # Install crontab entries
        echo '* * * * * /usr/local/bin/php /app/bin/console app:cleanup-games --env=prod >> /proc/1/fd/1 2>&1' > /etc/cron.d/scopa
        chmod 0644 /etc/cron.d/scopa
        crontab /etc/cron.d/scopa
        # Run cron in foreground
        exec cron -f
    depends_on:
      php:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scopa:scopa@postgres:5432/scopa?serverVersion=17
      APP_ENV: prod
    restart: unless-stopped

  mercure:
    image: dunglas/mercure
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!ForScopa2026!"
      MERCURE_SUBSCRIBER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!ForScopa2026!"
      MERCURE_EXTRA_DIRECTIVES: ""
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 3s
      timeout: 3s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "${INTERNAL_PORT:-5982}:443/tcp"   # HTTPS + HTTP/2
      - "${INTERNAL_PORT:-5982}:443/udp"   # HTTP/3 (QUIC)
    environment:
      EXTERNAL_HOSTNAME: ${EXTERNAL_HOSTNAME:-localhost}
      EXTERNAL_PORT: ${EXTERNAL_PORT:-5982}
      TLS_MODE: ${TLS_MODE:-selfsigned}
      # Only substitute these two variables in the nginx template;
      # leave nginx-native $variables (e.g. $host, $uri) untouched.
      NGINX_ENVSUBST_FILTER: "^EXTERNAL_"
    volumes:
      - ./ssl:/etc/nginx/ssl
    depends_on:
      php:
        condition: service_healthy
      mercure:
        condition: service_healthy

  # Automated Let's Encrypt via acme.sh + Dynu DNS-01 (profile: letsencrypt)
  # Start with:  docker compose --profile letsencrypt up -d
  acme:
    image: neilpang/acme.sh
    environment:
      Dynu_ClientId: ${DYNU_CLIENT_ID}
      Dynu_Secret: ${DYNU_SECRET}
    volumes:
      - ./ssl:/ssl
      - ./acme-data:/acme.sh
    entrypoint: ["sh", "-c"]
    command:
      - |
        DOMAIN="${EXTERNAL_HOSTNAME}"
        acme.sh --set-default-ca --server letsencrypt
        acme.sh --register-account 2>/dev/null || true
        install_cert() {
          acme.sh --install-cert -d "$$DOMAIN" --ecc \
            --fullchain-file /ssl/cert.pem --key-file /ssl/key.pem
        }
        issue_cert() {
          acme.sh --issue -d "$$DOMAIN" --dns dns_dynu "$$@" || {
            echo "acme: ERROR — certificate issuance failed for $$DOMAIN"
            return 1
          }
        }
        # Issue cert if not already present
        if ! acme.sh --list | grep -q "$$DOMAIN"; then
          issue_cert || exit 1
        fi
        # Install cert to shared ssl directory
        install_cert
        # If fullchain is missing (stale acme data), force re-issue
        if [ ! -s /ssl/cert.pem ]; then
          echo "acme: WARNING — fullchain empty, forcing re-issue"
          issue_cert --force || exit 1
          install_cert
        fi
        echo "acme: Certificate ready for $$DOMAIN"
        # Renewal loop: check daily, reinstall after renewal
        while true; do
          sleep 86400
          acme.sh --cron
          install_cert 2>/dev/null || true
        done
    profiles:
      - letsencrypt
    restart: unless-stopped

volumes:
  pgdata:
  acme-data:
