# Rate limit zones (keyed by client IP)
# Game creation: 5 req/min
limit_req_zone $binary_remote_addr zone=api_create:1m rate=5r/m;
# Game actions (play-card, select-capture, join, leave, next-round): 30 req/min
limit_req_zone $binary_remote_addr zone=api_action:2m rate=30r/m;
# Heartbeat: 20 req/min — accommodates two players behind the same NAT (each sends 6/min)
limit_req_zone $binary_remote_addr zone=api_heartbeat:1m rate=20r/m;
# Read endpoints (GET state, lookup): 60 req/min
limit_req_zone $binary_remote_addr zone=api_read:2m rate=60r/m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hashed JS/CSS bundles (content-hashed filenames, cache forever)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
    }

    # Static files at root (favicon, etc.)
    location ~* \.(?:svg|ico|png|jpg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
    }

    # ─── Rate-limited API routes ───

    # Game creation — strict limit
    location = /api/games {
        limit_req zone=api_create burst=2 nodelay;
        limit_req_status 429;
        include /etc/nginx/fastcgi_api.conf;
    }

    # Heartbeat — generous enough for two same-IP players
    location ~ ^/api/games/[0-9a-f\-]+/heartbeat$ {
        limit_req zone=api_heartbeat burst=3 nodelay;
        limit_req_status 429;
        include /etc/nginx/fastcgi_api.conf;
    }

    # Game actions (play-card, select-capture, join, leave, next-round)
    location ~ ^/api/games/[0-9a-f\-]+/(play-card|select-capture|join|leave|next-round)$ {
        limit_req zone=api_action burst=5 nodelay;
        limit_req_status 429;
        include /etc/nginx/fastcgi_api.conf;
    }

    # Read endpoints and any other API routes — general limit
    location /api/ {
        limit_req zone=api_read burst=10 nodelay;
        limit_req_status 429;
        include /etc/nginx/fastcgi_api.conf;
    }

    # Mercure SSE
    location /.well-known/mercure {
        proxy_pass http://mercure/.well-known/mercure;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 24h;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
