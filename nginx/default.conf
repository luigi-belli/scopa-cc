upstream php_backend {
    server php:9000;
    keepalive 8;
}

# Rate limit zones (keyed by client IP)
# Game creation: 5 req/min
limit_req_zone $binary_remote_addr zone=api_create:1m rate=5r/m;
# Game actions (play-card, select-capture, join, leave, next-round): 30 req/min
limit_req_zone $binary_remote_addr zone=api_action:2m rate=30r/m;
# Heartbeat: 20 req/min — accommodates two players behind the same NAT (each sends 6/min)
limit_req_zone $binary_remote_addr zone=api_heartbeat:1m rate=20r/m;
# Read endpoints (GET state, lookup): 60 req/min
limit_req_zone $binary_remote_addr zone=api_read:2m rate=60r/m;

# ─── Main HTTPS server: HTTP/2 + HTTP/3 (QUIC) ───
# Port 80 is not exposed in docker-compose.yml (only 443/tcp + 443/udp),
# so no HTTP→HTTPS redirect server block is needed.
server {
    # HTTP/2 over TLS (TCP)
    listen 443 ssl;
    http2 on;

    # HTTP/3 over QUIC (UDP)
    listen 443 quic reuseport;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── TLS Configuration (TLS 1.3 required for HTTP/3) ───
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # TLS session resumption for faster reconnects
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    # Session tickets disabled: without externally rotated ticket keys, a static
    # key weakens forward secrecy. TLS 1.3 PSK-based resumption still works via
    # ssl_session_cache, so reconnects remain fast without the risk.
    ssl_session_tickets off;

    # 0-RTT early data — reduces initial handshake latency
    # Safe for idempotent GET requests (game state, assets)
    ssl_early_data on;

    # ─── HTTP/3 (QUIC) settings ───
    # Advertise HTTP/3 support via Alt-Svc header
    # max-age=86400 (24h), browsers will try QUIC on subsequent requests
    add_header Alt-Svc 'h3=":5982"; ma=86400' always;

    # QUIC retry for address validation (anti-amplification)
    quic_retry on;

    # Enable QUIC gso (Generic Segmentation Offload) for better UDP performance
    quic_gso on;

    # ─── Compression (works over HTTP/2 and HTTP/3) ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/ld+json
        application/xml
        image/svg+xml
        font/woff2;

    # ─── Security headers ───
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # Reject early data on non-idempotent requests to prevent replay attacks
    # $ssl_early_data is "1" for 0-RTT requests
    set $early_data_reject 0;
    if ($ssl_early_data = "1") {
        set $early_data_reject 1;
    }

    # ─── SPA fallback ───
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hashed JS/CSS bundles (content-hashed filenames, cache forever)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Alt-Svc 'h3=":5982"; ma=86400' always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
    }

    # Static files at root (favicon, etc.)
    location ~* \.(?:svg|ico|png|jpg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public" always;
        add_header Alt-Svc 'h3=":5982"; ma=86400' always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
    }

    # ─── Rate-limited API routes ───

    # Reject 0-RTT early data on all POST endpoints (prevent replay attacks)

    # Game creation — strict limit
    location = /api/games {
        if ($early_data_reject = "1") {
            return 425;
        }
        limit_req zone=api_create burst=2 nodelay;
        limit_req_status 429;
        include /etc/nginx/fastcgi_api.conf;
    }

    # Heartbeat — generous enough for two same-IP players
    location ~ ^/api/games/[0-9a-f\-]+/heartbeat$ {
        if ($early_data_reject = "1") {
            return 425;
        }
        limit_req zone=api_heartbeat burst=3 nodelay;
        limit_req_status 429;
        include /etc/nginx/fastcgi_api.conf;
    }

    # Game actions (play-card, select-capture, join, leave, next-round)
    location ~ ^/api/games/[0-9a-f\-]+/(play-card|select-capture|join|leave|next-round)$ {
        if ($early_data_reject = "1") {
            return 425;
        }
        limit_req zone=api_action burst=5 nodelay;
        limit_req_status 429;
        include /etc/nginx/fastcgi_api.conf;
    }

    # Read endpoints and any other API routes — general limit
    location /api/ {
        limit_req zone=api_read burst=10 nodelay;
        limit_req_status 429;
        include /etc/nginx/fastcgi_api.conf;
    }

    # Mercure SSE — benefits from HTTP/2+ multiplexing (no head-of-line blocking)
    location /.well-known/mercure {
        proxy_pass http://mercure/.well-known/mercure;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 24h;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no always;
        add_header Alt-Svc 'h3=":5982"; ma=86400' always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    }
}
