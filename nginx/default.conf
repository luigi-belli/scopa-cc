server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hashed JS/CSS bundles (content-hashed filenames, cache forever)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static files at root (favicon, etc.)
    location ~* \.(?:svg|ico|png|jpg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # API — PHP-FPM via FastCGI
    location /api/ {
        # Rewrite is not needed — Symfony handles /api prefix via routing
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT /app/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_read_timeout 60s;
    }

    # Mercure SSE
    location /.well-known/mercure {
        proxy_pass http://mercure/.well-known/mercure;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 24h;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
    }
}
